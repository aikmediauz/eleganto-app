<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eleganto Luxury Boutique</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F2F0E9;
            --sage: #829281;
            --text: #4A4A4A;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
        }

        /* Header & Hero */
        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #EBE9E1, var(--bg));
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 700;
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 3px;
            opacity: 0.6;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Product Grid */
        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding-bottom: 100px;
        }

        .product-card {
            background: var(--white);
            border-radius: 0; /* Minimalist o'tkir qirralar */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:active {
            transform: scale(0.96);
        }

        .product-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #E8E6DF;
        }

        .product-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .product-price {
            font-weight: 600;
            font-size: 13px;
            color: var(--sage);
        }

        .buy-btn {
            width: 100%;
            background-color: var(--sage);
            color: white;
            border: none;
            padding: 12px;
            margin-top: 15px;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .buy-btn:active {
            opacity: 0.8;
        }

        #loader {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-style: italic;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header>
        <p class="subtitle">Elegance in Every Detail</p>
        <h1>Eleganto</h1>
    </header>

    <div id="loader">Kolleksiyani yuklamoqda...</div>
    <div class="container" id="product-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ⚠️ SIZNING GOOGLE SHEETS CSV LINKINGIZ
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRoILTZWJwn3ddZwdiwXey9i_gOMBg7CDXSrmQDakEv7F5rL8c2iXOvps0Y0fvhci1fgyy5CRsXdsvS/pub?output=csv';

        async function fetchProducts() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1); 

                const container = document.getElementById('product-container');
                document.getElementById('loader').style.display = 'none';

                rows.forEach(row => {
                    // CSV qatorlarini ehtiyotkorlik bilan ajratish
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length >= 5) {
                        const name = columns[0].replace(/"/g, '');
                        const price = columns[1].replace(/"/g, '');
                        const img = columns[4].replace(/"/g, '').trim();
                        
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        card.innerHTML = `
                            <img src="${img}" class="product-img" onerror="this.src='https://via.placeholder.com/300x450?text=Eleganto+Product'">
                            <div class="product-info">
                                <div>
                                    <div class="product-name">${name}</div>
                                    <div class="product-price">${price} UZS</div>
                                </div>
                                <button class="buy-btn" onclick="sendOrder('${name}')">Sotib olish</button>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (error) {
                console.error('Xatolik:', error);
            }
        }

        function sendOrder(name) {
            tg.sendData("BUY|" + name);
            tg.close();
        }

            fetchProducts();
    </script>
</body>
</html>
