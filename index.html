<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eleganto | Premium Boutique</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F2F0E9;
            --sage: #829281;
            --text: #333333;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 50px 20px 30px;
            text-align: center;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
            color: var(--text);
        }

        .tagline {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.5;
            margin-top: 10px;
        }

        /* Product Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 15px 100px;
        }

        .card {
            background: var(--white);
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }

        .card:active {
            transform: scale(0.97);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #E8E6DF;
        }

        .card-content {
            padding: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            margin: 0 0 5px;
            line-height: 1.2;
        }

        .product-price {
            font-weight: 600;
            font-size: 13px;
            color: var(--sage);
        }

        .btn-buy {
            width: 100%;
            background: var(--sage);
            color: white;
            border: none;
            padding: 12px;
            margin-top: 12px;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* Status States */
        #status-msg {
            text-align: center;
            padding: 40px;
            font-style: italic;
            font-size: 14px;
            opacity: 0.6;
        }

        .error-box {
            color: #a94442;
            background: #f2dede;
            padding: 15px;
            margin: 20px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <p class="tagline">Ecological & Luxury</p>
        <h1 class="brand-name">Eleganto</h1>
    </header>

    <div id="error-display" class="error-box"></div>
    <div id="status-msg">Kolleksiyani yuklamoqda...</div>
    
    <div class="grid" id="product-grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // JADVALINGIZNING TO'G'RI LINKI
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRoILTZWJwn3ddZwdiwXey9i_gOMBg7CDXSrmQDakEv7F5rL8c2iXOvps0Y0fvhci1fgyy5CRsXdsvS/pub?output=csv';

        async function initApp() {
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error("Google Sheets bilan bog'lanishda xato!");
                
                const text = await response.text();
                const rows = text.split('\n').slice(1); // Sarlavhani olib tashlaymiz

                const grid = document.getElementById('product-grid');
                const status = document.getElementById('status-msg');

                if (rows.length === 0 || rows[0].trim() === "") {
                    status.innerText = "Hozircha mahsulotlar yo'q. Bot orqali /add buyrug'ini ishlating.";
                    return;
                }

                status.style.display = 'none';

                rows.forEach((row, index) => {
                    // Murakkab CSV parsing (vergullar ichida bo'lsa ham ajratadi)
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 2) {
                        const name = cols[0] ? cols[0].replace(/"/g, '') : "Nomsiz mahsulot";
                        const price = cols[1] ? cols[1].replace(/"/g, '') : "0";
                        const img = cols[4] ? cols[4].replace(/"/g, '').trim() : "";
                        
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="${img}" onerror="this.src='https://via.placeholder.com/400x500?text=Eleganto+Collection'">
                            <div class="card-content">
                                <div>
                                    <h3 class="product-title">${name}</h3>
                                    <span class="product-price">${price} UZS</span>
                                </div>
                                <button class="btn-buy" onclick="sendOrder('${name}', '${price}')">Sotib olish</button>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });

            } catch (err) {
                console.error(err);
                document.getElementById('status-msg').style.display = 'none';
                const errBox = document.getElementById('error-display');
                errBox.style.display = 'block';
                errBox.innerText = "Xatolik: " + err.message + "\nLinkni tekshiring yoki jadvalingiz bo'sh bo'lishi mumkin.";
            }
        }

        function sendOrder(name, price) {
            tg.sendData(`BUY|${name}|${price}`);
            tg.close();
        }

        initApp();
    </script>
</body>
</html>
